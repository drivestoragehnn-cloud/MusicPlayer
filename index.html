<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پلیر موزیک شخصی</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Vazirmatn', sans-serif; }

  body {
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== پس‌زمینه گرادینت متحرک ===== */
  .bg-animated {
    position: fixed;
    inset: 0;
    z-index: -2;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.5;
    transition: background 1.4s ease-in-out, opacity 1.4s ease-in-out;
    animation: float 20s ease-in-out infinite;
  }

  .blob1 { width: 42vw; height: 42vw; top: -8%; right: -8%; background: #a5b4fc; animation-delay: 0s; }
  .blob2 { width: 38vw; height: 38vw; bottom: -10%; left: -6%; background: #f9a8d4; animation-delay: -6s; }
  .blob3 { width: 34vw; height: 34vw; top: 35%; left: 28%; background: #99f6e4; animation-delay: -12s; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(5%, 8%) scale(1.1); }
    66% { transform: translate(-5%, -5%) scale(0.95); }
  }

  /* ===== شیشه‌ای (Glassmorphism) ===== */
  .glass {
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 8px 32px rgba(31, 38, 135, 0.08);
  }

  .glass-light {
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.4);
  }

  .glass-strong {
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(28px) saturate(190%);
    -webkit-backdrop-filter: blur(28px) saturate(190%);
    border: 1px solid rgba(255, 255, 255, 0.65);
    box-shadow: 0 10px 36px rgba(31, 38, 135, 0.1);
  }

  /* ===== اسکرول‌بار ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.4); }

  /* ===== اسلایدرها ===== */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 5px;
    border-radius: 5px;
    background: rgba(99,102,241,0.18);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #6366f1;
    box-shadow: 0 2px 8px rgba(99,102,241,0.4);
    transition: transform 0.15s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.25); }
  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #6366f1;
    border: none;
    box-shadow: 0 2px 8px rgba(99,102,241,0.4);
  }

  /* ===== اکولایزر / ویژوالایزر ===== */
  .visualizer {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 5px;
    height: 70px;
  }
  .visualizer .bar {
    width: 6px;
    border-radius: 6px;
    background: linear-gradient(to top, #a5b4fc, #6366f1);
    height: 8px;
    transition: height 0.15s ease;
  }
  .visualizer.playing .bar {
    animation: eq-bounce 1s ease-in-out infinite alternate;
  }
  @keyframes eq-bounce {
    0% { height: 8px; }
    100% { height: 64px; }
  }

  /* ===== کاور چرخان ===== */
  .cover-spin {
    animation: spin-slow 16s linear infinite;
  }
  .cover-spin.paused { animation-play-state: paused; }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ===== انیمیشن ورود کارت‌ها ===== */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fade-up 0.6s ease both; }
  .fade-up-delay1 { animation: fade-up 0.6s 0.08s ease both; }
  .fade-up-delay2 { animation: fade-up 0.6s 0.16s ease both; }
  .fade-up-delay3 { animation: fade-up 0.6s 0.24s ease both; }

  @keyframes pop-in {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }
  .pop-in { animation: pop-in 0.35s ease both; }

  /* ===== دکمه کنترل ===== */
  .ctrl-btn {
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .ctrl-btn:hover { transform: translateY(-2px); }
  .ctrl-btn:active { transform: scale(0.92); }

  .play-btn {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .play-btn:hover { transform: scale(1.06); }
  .play-btn:active { transform: scale(0.94); }

  .active-toggle {
    color: #fff !important;
    background: #6366f1 !important;
  }

  /* ===== ناحیه درگ و دراپ ===== */
  .dropzone {
    transition: all 0.25s ease;
  }
  .dropzone.dragover {
    border-color: #6366f1 !important;
    background: rgba(99,102,241,0.08) !important;
    transform: scale(1.01);
  }

  /* ===== کارت‌های لیست پخش ===== */
  .track-card {
    transition: all 0.25s ease;
  }
  .track-card:hover {
    transform: translateY(-3px);
  }
  .track-card.active {
    box-shadow: 0 8px 24px rgba(99,102,241,0.18);
  }

  /* ===== متن گرادینت ===== */
  .text-gradient {
    background: linear-gradient(135deg, #6366f1, #ec4899);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  @media (max-width: 768px) {
    .visualizer .bar { width: 4px; }
  }
</style>
</head>
<body class="text-slate-700 min-h-screen p-4 sm:p-6 lg:p-8">

  <!-- پس‌زمینه پویا -->
  <div class="bg-animated" style="background: linear-gradient(135deg, #eef2ff 0%, #fdf2f8 50%, #f0fdfa 100%);">
    <div class="blob blob1" id="blob1"></div>
    <div class="blob blob2" id="blob2"></div>
    <div class="blob blob3" id="blob3"></div>
  </div>

  <div class="relative max-w-6xl mx-auto">

    <!-- ===== هدر / خوش‌آمدگویی ===== -->
    <header class="flex items-center justify-between mb-6 fade-up">
      <div>
        <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-800">سلام 👋 خوش اومدی</h1>
        <p class="text-sm text-slate-500 mt-1">موزیک‌های خودت رو ایمپورت کن و لذت ببر</p>
      </div>
      <div class="w-12 h-12 rounded-2xl glass-strong flex items-center justify-center">
        <i class="fa-solid fa-headphones-simple text-indigo-500 text-xl"></i>
      </div>
    </header>

    <!-- ===== گرید اصلی (Bento) ===== -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

      <!-- ===== ستون چپ: پلیر + ویژوالایزر ===== -->
      <div class="lg:col-span-2 flex flex-col gap-5">

        <!-- کارت پلیر -->
        <div class="glass rounded-3xl p-6 sm:p-8 flex flex-col gap-6 fade-up-delay1">

          <div id="emptyState" class="flex flex-col items-center justify-center text-center py-10 gap-3">
            <div class="w-20 h-20 rounded-full glass-strong flex items-center justify-center">
              <i class="fa-solid fa-music text-3xl text-indigo-400"></i>
            </div>
            <p class="text-slate-500 text-sm">هنوز آهنگی ایمپورت نشده.<br>از پایین فایل‌های خودت رو اضافه کن.</p>
          </div>

          <div id="playerArea" class="hidden flex-col gap-6">
            <!-- کاور + اطلاعات آهنگ -->
            <div class="flex flex-col sm:flex-row items-center gap-6">
              <div class="relative shrink-0">
                <div class="w-36 h-36 sm:w-44 sm:h-44 rounded-full glass-strong p-2 cover-spin paused" id="coverSpin">
                  <div id="coverImg" class="w-full h-full rounded-full border-4 border-white/60 flex items-center justify-center text-4xl text-white font-bold" style="background: linear-gradient(135deg, #a5b4fc, #f9a8d4);">
                    <i class="fa-solid fa-music"></i>
                  </div>
                </div>
                <div class="absolute inset-0 flex items-center justify-center">
                  <div class="w-5 h-5 rounded-full bg-white shadow"></div>
                </div>
              </div>

              <div class="flex-1 w-full text-center sm:text-right min-w-0">
                <h2 id="trackTitle" class="text-xl sm:text-2xl font-extrabold mb-1 truncate text-slate-800">—</h2>
                <p id="trackArtist" class="text-slate-500 text-sm mb-4 truncate">—</p>

                <!-- نوار پیشرفت -->
                <input type="range" id="progressBar" min="0" max="100" value="0" class="w-full">
                <div class="flex justify-between text-xs text-slate-500 mt-1.5 font-mono">
                  <span id="currentTime">0:00</span>
                  <span id="totalTime">0:00</span>
                </div>
              </div>
            </div>

            <!-- کنترلرها -->
            <div class="flex items-center justify-center gap-3 sm:gap-5">
              <button id="shuffleBtn" aria-label="پخش تصادفی" class="ctrl-btn w-10 h-10 rounded-full glass-light flex items-center justify-center text-slate-500 hover:text-indigo-500">
                <i class="fa-solid fa-shuffle text-sm"></i>
              </button>
              <button id="prevBtn" aria-label="آهنگ قبلی" class="ctrl-btn w-12 h-12 rounded-full glass-light flex items-center justify-center text-lg text-slate-600">
                <i class="fa-solid fa-backward-step"></i>
              </button>
              <button id="playBtn" aria-label="پخش / توقف" class="play-btn w-16 h-16 rounded-full bg-indigo-500 text-white flex items-center justify-center text-2xl shadow-lg">
                <i class="fa-solid fa-play" id="playIcon"></i>
              </button>
              <button id="nextBtn" aria-label="آهنگ بعدی" class="ctrl-btn w-12 h-12 rounded-full glass-light flex items-center justify-center text-lg text-slate-600">
                <i class="fa-solid fa-forward-step"></i>
              </button>
              <button id="repeatBtn" aria-label="تکرار" class="ctrl-btn w-10 h-10 rounded-full glass-light flex items-center justify-center text-slate-500 hover:text-indigo-500">
                <i class="fa-solid fa-repeat text-sm"></i>
              </button>
            </div>

            <!-- ولوم -->
            <div class="flex items-center gap-4 pt-2 border-t border-white/50">
              <i class="fa-solid fa-volume-low text-slate-400 text-sm"></i>
              <input type="range" id="volumeBar" min="0" max="100" value="70" class="flex-1">
              <i class="fa-solid fa-volume-high text-slate-400 text-sm"></i>
            </div>
          </div>
        </div>

        <!-- کارت اکولایزر -->
        <div class="glass rounded-3xl p-6 sm:p-8 flex flex-col gap-4 fade-up-delay2">
          <div class="flex items-center gap-2 text-slate-500">
            <i class="fa-solid fa-wave-square text-sm"></i>
            <h3 class="text-sm font-bold">اکولایزر</h3>
          </div>
          <div class="visualizer" id="visualizer">
            <div class="bar" style="animation-duration: 0.6s;"></div>
            <div class="bar" style="animation-duration: 0.9s;"></div>
            <div class="bar" style="animation-duration: 0.5s;"></div>
            <div class="bar" style="animation-duration: 1.1s;"></div>
            <div class="bar" style="animation-duration: 0.7s;"></div>
            <div class="bar" style="animation-duration: 0.4s;"></div>
            <div class="bar" style="animation-duration: 1.2s;"></div>
            <div class="bar" style="animation-duration: 0.65s;"></div>
            <div class="bar" style="animation-duration: 0.85s;"></div>
            <div class="bar" style="animation-duration: 0.55s;"></div>
            <div class="bar" style="animation-duration: 1.0s;"></div>
            <div class="bar" style="animation-duration: 0.75s;"></div>
            <div class="bar" style="animation-duration: 0.95s;"></div>
            <div class="bar" style="animation-duration: 0.45s;"></div>
            <div class="bar" style="animation-duration: 1.05s;"></div>
            <div class="bar" style="animation-duration: 0.6s;"></div>
            <div class="bar" style="animation-duration: 0.8s;"></div>
            <div class="bar" style="animation-duration: 0.5s;"></div>
          </div>
        </div>
      </div>

      <!-- ===== ستون راست: ایمپورت + پلی‌لیست ===== -->
      <div class="flex flex-col gap-5">

        <!-- کارت ایمپورت -->
        <div class="glass rounded-3xl p-6 fade-up-delay1">
          <h3 class="text-sm font-bold text-slate-600 mb-3 flex items-center gap-2">
            <i class="fa-solid fa-folder-open text-indigo-400"></i> ایمپورت آهنگ
          </h3>
          <div id="dropzone" class="dropzone glass-light rounded-2xl border-2 border-dashed border-indigo-200 flex flex-col items-center justify-center text-center gap-2 py-8 px-4 cursor-pointer">
            <i class="fa-solid fa-cloud-arrow-up text-3xl text-indigo-400"></i>
            <p class="text-sm text-slate-500">فایل‌ها رو بکش و رها کن<br>یا کلیک کن</p>
            <p class="text-xs text-slate-400">MP3 · WAV · OGG · M4A</p>
          </div>
          <input type="file" id="fileInput" accept="audio/*" multiple class="hidden">
        </div>

        <!-- کارت پلی‌لیست -->
        <div class="glass rounded-3xl p-6 flex-1 flex flex-col gap-3 fade-up-delay2 min-h-[280px]">
          <h3 class="text-sm font-bold text-slate-600 flex items-center gap-2">
            <i class="fa-solid fa-list-ul text-indigo-400"></i> لیست پخش
            <span id="trackCount" class="mr-auto text-xs font-normal text-slate-400">0 آهنگ</span>
          </h3>
          <div id="playlistItems" class="flex flex-col gap-2 overflow-y-auto max-h-[420px] pr-1">
            <p id="playlistEmpty" class="text-xs text-slate-400 text-center py-6">لیست پخش خالی است</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- المان صوتی پنهان -->
  <audio id="audioPlayer"></audio>

<script>
/* ================== متغیرهای وضعیت ================== */
let tracks = [];          // { title, fileName, ext, url, color1, color2, duration }
let currentIndex = -1;
let isPlaying = false;
let isShuffle = false;
let repeatMode = 0; // 0: خاموش, 1: تکرار همه, 2: تکرار یکی

/* پالت‌های پاستل برای کاور پیش‌فرض */
const coverPalettes = [
  ["#a5b4fc", "#f9a8d4"],
  ["#99f6e4", "#a5b4fc"],
  ["#fde68a", "#fca5a5"],
  ["#bbf7d0", "#bfdbfe"],
  ["#fbcfe8", "#ddd6fe"],
  ["#fed7aa", "#fef08a"],
  ["#c7d2fe", "#fbcfe8"]
];

/* جفت‌رنگ‌های پس‌زمینه برای حالت پخش */
const bgPalettes = [
  ["#eef2ff", "#fdf2f8", "#f0fdfa"],
  ["#f0fdfa", "#eef2ff", "#fef3c7"],
  ["#fdf2f8", "#fef9c3", "#eef2ff"],
  ["#f0fdf4", "#eff6ff", "#fdf4ff"],
  ["#fff7ed", "#f0fdfa", "#fdf2f8"]
];

/* ================== المان‌ها ================== */
const audioPlayer = document.getElementById('audioPlayer');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const repeatBtn = document.getElementById('repeatBtn');
const progressBar = document.getElementById('progressBar');
const volumeBar = document.getElementById('volumeBar');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');
const trackTitle = document.getElementById('trackTitle');
const trackArtist = document.getElementById('trackArtist');
const coverImg = document.getElementById('coverImg');
const coverSpin = document.getElementById('coverSpin');
const visualizer = document.getElementById('visualizer');
const emptyState = document.getElementById('emptyState');
const playerArea = document.getElementById('playerArea');
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const playlistItems = document.getElementById('playlistItems');
const playlistEmpty = document.getElementById('playlistEmpty');
const trackCount = document.getElementById('trackCount');
const bodyBg = document.querySelector('.bg-animated');
const blob1 = document.getElementById('blob1');
const blob2 = document.getElementById('blob2');
const blob3 = document.getElementById('blob3');

/* ================== توابع کمکی ================== */
function formatTime(sec) {
  if (!isFinite(sec) || isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function getFileExt(name) {
  const parts = name.split('.');
  return parts.length > 1 ? parts.pop().toUpperCase() : 'فایل';
}

function getCleanTitle(fileName) {
  return fileName.replace(/\.[^/.]+$/, '');
}

function randomPalette(arr, index) {
  return arr[index % arr.length];
}

/* ================== ایمپورت فایل‌ها ================== */
function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f => f.type.startsWith('audio/') || /\.(mp3|wav|ogg|m4a|flac|aac)$/i.test(f.name));
  if (files.length === 0) return;

  files.forEach((file) => {
    const url = URL.createObjectURL(file);
    const palette = randomPalette(coverPalettes, tracks.length);
    const track = {
      title: getCleanTitle(file.name),
      ext: getFileExt(file.name),
      url: url,
      color1: palette[0],
      color2: palette[1],
      duration: 0
    };
    tracks.push(track);
  });

  renderPlaylist();

  // اگر این اولین ایمپورت است، آهنگ اول را بار کن
  if (currentIndex === -1 && tracks.length > 0) {
    currentIndex = 0;
    loadTrack(false);
    emptyState.classList.add('hidden');
    playerArea.classList.remove('hidden');
    playerArea.classList.add('flex');
    playerArea.classList.add('pop-in');
  }
}

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

['dragenter', 'dragover'].forEach(evt => {
  dropzone.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropzone.classList.add('dragover');
  });
});
['dragleave', 'drop'].forEach(evt => {
  dropzone.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropzone.classList.remove('dragover');
  });
});
dropzone.addEventListener('drop', (e) => {
  const dt = e.dataTransfer;
  if (dt && dt.files) handleFiles(dt.files);
});

/* ================== رندر لیست پخش ================== */
function renderPlaylist() {
  trackCount.textContent = `${tracks.length} آهنگ`;
  if (tracks.length === 0) {
    playlistEmpty.classList.remove('hidden');
    playlistItems.innerHTML = '';
    playlistItems.appendChild(playlistEmpty);
    return;
  }
  playlistEmpty.classList.add('hidden');
  playlistItems.innerHTML = '';

  tracks.forEach((track, i) => {
    const item = document.createElement('div');
    item.className = `track-card flex items-center gap-3 p-3 rounded-2xl cursor-pointer ${i === currentIndex ? 'glass-strong active' : 'hover:bg-white/30'}`;
    item.innerHTML = `
      <div class="w-11 h-11 rounded-xl flex items-center justify-center text-white text-sm shrink-0" style="background: linear-gradient(135deg, ${track.color1}, ${track.color2});">
        <i class="fa-solid ${i === currentIndex && isPlaying ? 'fa-volume-high' : 'fa-music'}"></i>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-bold truncate ${i === currentIndex ? 'text-indigo-600' : 'text-slate-700'}">${track.title}</p>
        <p class="text-xs text-slate-400 truncate">${track.ext}</p>
      </div>
      <button data-idx="${i}" aria-label="حذف آهنگ" class="remove-btn ctrl-btn w-7 h-7 rounded-full glass-light flex items-center justify-center text-xs text-slate-400 hover:text-rose-400 shrink-0">
        <i class="fa-solid fa-xmark"></i>
      </button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.closest('.remove-btn')) return;
      if (i !== currentIndex) {
        currentIndex = i;
        loadTrack(true);
      }
    });
    playlistItems.appendChild(item);
  });

  // دکمه‌های حذف
  playlistItems.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx, 10);
      removeTrack(idx);
    });
  });
}

function removeTrack(idx) {
  URL.revokeObjectURL(tracks[idx].url);
  tracks.splice(idx, 1);

  if (tracks.length === 0) {
    currentIndex = -1;
    pausePlayback();
    audioPlayer.src = '';
    emptyState.classList.remove('hidden');
    playerArea.classList.add('hidden');
    playerArea.classList.remove('flex');
    resetBackground();
  } else if (idx === currentIndex) {
    currentIndex = Math.min(idx, tracks.length - 1);
    loadTrack(isPlaying);
  } else if (idx < currentIndex) {
    currentIndex--;
  }
  renderPlaylist();
}

/* ================== بارگذاری آهنگ ================== */
function loadTrack(autoplay = false) {
  const track = tracks[currentIndex];
  trackTitle.textContent = track.title;
  trackArtist.textContent = `فایل ${track.ext}`;
  coverImg.style.background = `linear-gradient(135deg, ${track.color1}, ${track.color2})`;

  audioPlayer.src = track.url;
  audioPlayer.load();

  // تغییر نرم پس‌زمینه هماهنگ با کاور آهنگ
  const palette = bgPalettes[currentIndex % bgPalettes.length];
  bodyBg.style.background = `linear-gradient(135deg, ${palette[0]} 0%, ${palette[1]} 50%, ${palette[2]} 100%)`;
  blob1.style.background = track.color1;
  blob2.style.background = track.color2;
  blob3.style.background = palette[2];

  renderPlaylist();

  if (autoplay) {
    audioPlayer.play().then(() => startPlayback()).catch(() => pausePlayback());
  } else {
    pausePlayback();
  }
}

function resetBackground() {
  bodyBg.style.background = 'linear-gradient(135deg, #eef2ff 0%, #fdf2f8 50%, #f0fdfa 100%)';
  blob1.style.background = '#a5b4fc';
  blob2.style.background = '#f9a8d4';
  blob3.style.background = '#99f6e4';
}

/* ================== پخش / توقف ================== */
function startPlayback() {
  isPlaying = true;
  playIcon.className = 'fa-solid fa-pause';
  visualizer.classList.add('playing');
  coverSpin.classList.remove('paused');
  renderPlaylist();
}

function pausePlayback() {
  isPlaying = false;
  playIcon.className = 'fa-solid fa-play';
  visualizer.classList.remove('playing');
  coverSpin.classList.add('paused');
  renderPlaylist();
}

function togglePlay() {
  if (currentIndex === -1) return;
  if (isPlaying) {
    audioPlayer.pause();
    pausePlayback();
  } else {
    audioPlayer.play().then(() => startPlayback()).catch(() => {});
  }
}

/* ================== ناوبری آهنگ‌ها ================== */
function goNext(continuePlaying = isPlaying) {
  if (tracks.length === 0) return;
  if (isShuffle) {
    let newIndex;
    do {
      newIndex = Math.floor(Math.random() * tracks.length);
    } while (newIndex === currentIndex && tracks.length > 1);
    currentIndex = newIndex;
  } else {
    if (currentIndex === tracks.length - 1) {
      if (repeatMode === 0) {
        currentIndex = 0;
        loadTrack(false);
        return;
      }
      currentIndex = 0;
    } else {
      currentIndex++;
    }
  }
  loadTrack(continuePlaying);
}

function goPrev() {
  if (tracks.length === 0) return;
  if (isShuffle) {
    currentIndex = Math.floor(Math.random() * tracks.length);
  } else {
    currentIndex = currentIndex === 0 ? tracks.length - 1 : currentIndex - 1;
  }
  loadTrack(isPlaying);
}

/* ================== رویدادهای صوتی ================== */
audioPlayer.addEventListener('loadedmetadata', () => {
  totalTimeEl.textContent = formatTime(audioPlayer.duration);
  progressBar.max = Math.floor(audioPlayer.duration) || 100;
});

audioPlayer.addEventListener('timeupdate', () => {
  progressBar.value = audioPlayer.currentTime;
  currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
});

audioPlayer.addEventListener('ended', () => {
  if (repeatMode === 2) {
    audioPlayer.currentTime = 0;
    audioPlayer.play().then(() => startPlayback());
    return;
  }
  goNext(true);
});

/* ================== رویدادهای کنترل ================== */
playBtn.addEventListener('click', togglePlay);
nextBtn.addEventListener('click', () => goNext());
prevBtn.addEventListener('click', () => goPrev());

shuffleBtn.addEventListener('click', () => {
  isShuffle = !isShuffle;
  shuffleBtn.classList.toggle('active-toggle', isShuffle);
});

repeatBtn.addEventListener('click', () => {
  repeatMode = (repeatMode + 1) % 3;
  const icon = repeatBtn.querySelector('i');
  if (repeatMode === 0) {
    icon.className = 'fa-solid fa-repeat text-sm';
    repeatBtn.classList.remove('active-toggle');
  } else if (repeatMode === 1) {
    icon.className = 'fa-solid fa-repeat text-sm';
    repeatBtn.classList.add('active-toggle');
  } else {
    icon.className = 'fa-solid fa-repeat-1 text-sm';
    repeatBtn.classList.add('active-toggle');
  }
});

progressBar.addEventListener('input', (e) => {
  audioPlayer.currentTime = parseFloat(e.target.value);
  currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
});

volumeBar.addEventListener('input', (e) => {
  const val = parseInt(e.target.value, 10);
  audioPlayer.volume = val / 100;
  const volIconLow = volumeBar.previousElementSibling;
  if (val === 0) {
    volIconLow.className = 'fa-solid fa-volume-xmark text-slate-400 text-sm';
  } else if (val < 50) {
    volIconLow.className = 'fa-solid fa-volume-low text-slate-400 text-sm';
  } else {
    volIconLow.className = 'fa-solid fa-volume-high text-slate-400 text-sm';
  }
});

/* ================== مقداردهی اولیه ================== */
audioPlayer.volume = 0.7;
renderPlaylist();
</script>
</body>
